<div class="space-y-6 max-w-7xl mx-auto">

    <div class="flex justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Tipos de Amostras</h1>
            <p class="text-gray-600">Crie e gerencie os os tipos de amostras.</p>
        </div>

        <p-button label="Criar Tipo de Amostra" icon="fa-solid fa-user-plus" [raised]="true" severity="info"
            (onClick)="cadastrarTipoDeAmostra()"></p-button>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4">
        <div class="flex flex-row gap-4">
            <input pInputText placeholder="Busca por Tipo de amostra" fluid [(ngModel)]="pesquisa" [pAutoFocus]="true">

            <p-select [options]="filtrosStatus" [(ngModel)]="filtroSelecionadoStatus"></p-select>
        </div>
    </div>


    <p-table [value]="amostras" [tableStyle]="{ 'min-width': '50rem' }" [paginator]="true" [rows]="5"
        [rowsPerPageOptions]="[5, 10, 20]">
        <ng-template #header>
            <tr>
                <th>Id</th>
                <th>Tipo de Amostra</th>
                <th>Tipo de Publicação</th>
                <th>Status</th>
                <th>
                    <div class="text-right">Ações</div>
                </th>
            </tr>
        </ng-template>
        <ng-template #body let-colaborador>
            <tr>
                <td>{{ amostras.id }}</td>
                <td>{{ amostras.tipo }}</td>
                <td>{{ amostras.publicacao }}</td>
                <td>
                    <app-registro-status-tag [status]="amostras.status" />
                </td>
                <td>
                    <div class="flex gap-1 justify-end">
                        <p-button icon="fa-regular fa-pen-to-square" variant="text" severity="info" />
                        <p-button icon="fa fa-trash" variant="text" severity="danger" />
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<div class="card flex justify-center">
    <p-dialog header="Cadastro de Novo Tipo de Amostra" [modal]="true" [(visible)]="visible"
        [style]="{ width: '50rem' }" [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }">

        <form [formGroup]="formAmostras" class="w-full">

            <div class="card flex justify-center w-full">
                <p-stepper [value]="1" class="w-full">

                    <p-step-list>
                        <p-step [value]="1">
                            <p class="font-semibold">Identificação</p>
                        </p-step>
                        <p-step [value]="2">
                            <p class="font-semibold">Informações</p>
                        </p-step>
                    </p-step-list>

                    <p-step-panels>

                        <p-step-panel [value]="1">
                            <ng-template #content let-activateCallback="activateCallback">

                                <div
                                    class="p-4 border-2 border-dashed border-surface-200 dark:border-surface-700 rounded bg-surface-50 dark:bg-surface-950 flex flex-col gap-4 min-h-[260px]">

                                    <div class="flex flex-col gap-1">
                                        <label for="identificacao" class="font-semibold">
                                            Identificação <span class="text-red-700">*</span>
                                        </label>
                                        <input pInputText id="identificacao" formControlName="identificacao"
                                            class="w-full">
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="flex flex-col gap-1">
                                            <label for="motivo" class="font-semibold">Motivo da Amostra</label>
                                            <p-select id="motivo" [options]="motivo" optionLabel="label"
                                                optionValue="value" formControlName="motivo" class="w-full"></p-select>
                                        </div>

                                        <div class="flex flex-col gap-1">
                                            <label for="cpf" class="font-semibold">
                                                CPF <span class="text-red-700">*</span>
                                            </label>
                                            <p-inputmask mask="999.999.999-99" id="cpf" formControlName="cpf"
                                                class="w-full"></p-inputmask>
                                        </div>
                                    </div>

                                </div>

                                <div class="flex pt-4 justify-end">
                                    <p-button label="Next" severity="primary" icon="pi pi-arrow-right"
                                        (onClick)="activateCallback(2)" />
                                </div>

                            </ng-template>
                        </p-step-panel>

                        <p-step-panel [value]="2">
                            <ng-template #content let-activateCallback="activateCallback">

                                <div
                                    class="p-4 border-2 border-dashed border-surface-200 dark:border-surface-700 rounded bg-surface-50 dark:bg-surface-950 flex flex-col gap-4 min-h-[260px]">

                                    <div class="flex flex-col gap-1">
                                        <label for="cargo" class="font-semibold">Cargo</label>
                                        <p-select id="cargo" [options]="cargos" optionLabel="label" optionValue="value"
                                            formControlName="cargo" class="w-full"></p-select>
                                    </div>

                                    <div class="flex flex-col gap-1">
                                        <label for="setor" class="font-semibold">Setor/Departamento</label>
                                        <p-select id="setor" [options]="setores" optionLabel="label" optionValue="value"
                                            formControlName="setor" class="w-full"></p-select>
                                    </div>

                                    <div class="flex flex-col gap-1">
                                        <label for="admissao" class="font-semibold">Data de admissão</label>
                                        <p-date-picker id="admissao" formControlName="admissao"
                                            class="w-full"></p-date-picker>
                                    </div>

                                </div>

                                <div class="flex pt-4 justify-between">
                                    <p-button label="Back" severity="secondary" icon="pi pi-arrow-left"
                                        (onClick)="activateCallback(1)" />
                                    <p-button label="Next" severity="primary" icon="pi pi-arrow-right"
                                        (onClick)="activateCallback(3)" />
                                </div>

                            </ng-template>
                        </p-step-panel>

                        <p-step-panel [value]="3">
                            <ng-template #content let-activateCallback="activateCallback">

                                <div
                                    class="p-4 border-2 border-dashed border-surface-200 dark:border-surface-700 rounded bg-surface-50 dark:bg-surface-950 flex flex-col gap-4 min-h-[260px]">

                                    <div class="flex flex-col gap-1">
                                        <label for="email" class="font-semibold">E-mail Corporativo</label>
                                        <input pInputText id="email" type="email" formControlName="email"
                                            class="w-full">
                                    </div>

                                    <div class="flex flex-col gap-1">
                                        <label for="nivel" class="font-semibold">Nível de permissão</label>
                                        <p-select id="nivel" [options]="niveis" optionLabel="label" optionValue="value"
                                            formControlName="nivel" class="w-full"></p-select>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="flex flex-col gap-1">
                                            <label for="senha" class="font-semibold">Senha</label>
                                            <input pInputText id="senha" type="password" formControlName="senha"
                                                class="w-full">
                                        </div>

                                        <div class="flex flex-col gap-1">
                                            <label for="confirmarSenha" class="font-semibold">Confirmar Senha</label>
                                            <input pInputText id="confirmarSenha" type="password"
                                                formControlName="confirmarSenha" class="w-full">
                                        </div>
                                    </div>

                                </div>

                                <div class="flex pt-4 justify-between">
                                    <p-button label="Back" severity="secondary" icon="pi pi-arrow-left"
                                        (onClick)="activateCallback(2)" />
                                    <p-button label="Salvar" severity="success" icon="pi pi-check" />
                                </div>

                            </ng-template>
                        </p-step-panel>

                    </p-step-panels>

                </p-stepper>
            </div>

        </form>

    </p-dialog>
</div>
