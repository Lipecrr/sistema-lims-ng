<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="space-y-6 max-w-4xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">Cadastro</p>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-950">{{ tituloPagina }}</h1>
      <p class="max-w-2xl text-sm leading-6 text-slate-600">Registre uma amostra padrão que poderá ser usada em propostas, OS ou atividades comerciais.</p>
    </div>
    <div class="flex gap-3">
      <button
        type="button"
        routerLink="/tipos-amostras"
        class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
      >
        Voltar
      </button>
      <button
        *ngIf="modoVisualizacao"
        type="button"
        (click)="irParaEdicao()"
        class="inline-flex items-center justify-center gap-2 rounded-2xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700"
      >
        <i class="pi pi-pencil"></i>
        Editar
      </button>
    </div>
  </div>

  <form [formGroup]="formAmostra" class="grid gap-6 rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm">
    <div class="grid gap-6 md:grid-cols-2">
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">Identificação</label>
        <input
          type="text"
          formControlName="tipo"
          placeholder="Ex.: Água Potável"
          class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
        />
        <p *ngIf="controle['tipo'].invalid && controle['tipo'].touched" class="text-sm text-red-600">Informe a identificação do tipo de amostra.</p>
      </div>

      <div class="grid gap-3">
        <label class="flex items-center gap-3 rounded-2xl border border-slate-300 bg-slate-50 px-4 py-4 text-sm text-slate-900">
          <input type="checkbox" formControlName="publicacaoManual" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
          <span>Publicação Manual</span>
        </label>

        <label class="flex items-center gap-3 rounded-2xl border border-slate-300 bg-slate-50 px-4 py-4 text-sm text-slate-900">
          <input type="checkbox" formControlName="obrigarDataColeta" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
          <span>Obrigar data de coleta?</span>
        </label>
      </div>
    </div>

    <div class="grid gap-6 md:grid-cols-2">
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">Motivo da Amostra</label>
        <select
          formControlName="motivo"
          class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
        >
          <option *ngFor="let motivo of motivoOptions" [value]="motivo">{{ motivo }}</option>
        </select>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">Status</label>
        <select
          formControlName="status"
          class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
        >
          <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
        </select>
      </div>
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-semibold text-slate-700">Observações</label>
      <textarea
        rows="3"
        formControlName="observacoes"
        class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
      ></textarea>
    </div>

    <div *ngIf="!modoVisualizacao" class="flex flex-col gap-3 sm:flex-row sm:justify-end">
      <button
        type="button"
        (click)="cancelar()"
        class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
      >
        Cancelar
      </button>
      <button
        type="button"
        (click)="salvar()"
        class="inline-flex items-center justify-center rounded-2xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700"
      >
        {{ id ? 'Salvar Alterações' : 'Salvar Tipo de Amostra' }}
      </button>
    </div>
  </form>
</div>
