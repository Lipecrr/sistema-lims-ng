<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="space-y-6 max-w-5xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">Cadastro</p>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-950">{{ tituloPagina }}</h1>
      <p class="max-w-2xl text-sm leading-6 text-slate-600">Campo de preenchimento reutilizável em tipos de atividade e propostas.</p>
    </div>
    <div class="flex gap-3">
      <button type="button" routerLink="/informacoes"
        class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
        Voltar
      </button>
      <button *ngIf="modoVisualizacao" type="button" (click)="irParaEdicao()"
        class="inline-flex items-center justify-center gap-2 rounded-2xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700">
        <i class="pi pi-pencil"></i>
        Editar
      </button>
    </div>
  </div>

  <div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
    <div class="flex flex-col gap-3 sm:flex-row">
      <button type="button" (click)="setTab('detalhes')"
        [class]="currentTab() === 'detalhes' ? 'rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white' : 'rounded-2xl bg-slate-100 px-5 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-200'">
        Detalhes
      </button>
      <button type="button" (click)="setTab('opcoes')"
        [class]="currentTab() === 'opcoes' ? 'rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white' : 'rounded-2xl bg-slate-100 px-5 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-200'">
        Opções de Valores
      </button>
    </div>

    <div class="mt-8 space-y-8">

      <!-- ================= DETALHES ================= -->
      <section *ngIf="currentTab() === 'detalhes'" [formGroup]="formDetalhes">
        <div class="grid gap-6 md:grid-cols-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700">Id</label>
            <input type="text" formControlName="id"
              class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-100 px-4 py-3 text-sm text-slate-700 outline-none" />
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-700">Identificação</label>
            <input type="text" formControlName="identificacao" placeholder="Nome da informação"
              class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100" />
            <p *ngIf="controle['identificacao'].invalid && controle['identificacao'].touched" class="mt-1 text-sm text-red-600">Informe a identificação (mínimo 2 caracteres).</p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700">Tipo</label>
            <select formControlName="tipo"
              class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100">
              <option *ngFor="let t of tipoOptions" [value]="t">{{ t }}</option>
            </select>
          </div>
          <div class="md:col-span-4">
            <label class="flex items-center gap-2 text-sm text-slate-700">
              <input type="checkbox" formControlName="valorLivre" class="h-4 w-4 rounded border-slate-300" />
              Valor Livre? <span class="text-slate-400">(permite digitar um valor fora da lista de opções)</span>
            </label>
          </div>
        </div>
      </section>

      <!-- ================= OPÇÕES DE VALORES ================= -->
      <section *ngIf="currentTab() === 'opcoes'">
        <div *ngIf="!modoVisualizacao" [formGroup]="formOpcao" class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <div class="mb-4 text-sm font-semibold text-slate-700">Adicionar opção</div>
          <div class="flex flex-col gap-3 sm:flex-row sm:items-end">
            <div class="flex-1">
              <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Valor</label>
              <input type="text" formControlName="valor" placeholder="Ex.: 30 ddl"
                class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-blue-600" />
            </div>
            <button type="button" (click)="adicionarOpcao()"
              class="inline-flex h-11 items-center justify-center rounded-2xl bg-blue-600 px-6 text-sm font-semibold text-white transition hover:bg-blue-700">
              Adicionar
            </button>
          </div>
        </div>

        <div class="mt-6 overflow-x-auto rounded-2xl border border-slate-200">
          <table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-50 text-slate-600">
              <tr class="text-left">
                <th class="px-4 py-3 font-semibold w-16">#</th>
                <th class="px-4 py-3 font-semibold">Valor</th>
                <th *ngIf="!modoVisualizacao" class="px-4 py-3 text-right font-semibold">Ações</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-200 bg-white text-slate-800">
              <ng-container *ngFor="let opcao of opcoes(); let i = index">
                <tr *ngIf="editandoOpcao() !== i">
                  <td class="px-4 py-3 text-slate-500">{{ i + 1 }}</td>
                  <td class="px-4 py-3 font-medium text-slate-900">{{ opcao.valor }}</td>
                  <td *ngIf="!modoVisualizacao" class="px-4 py-3 text-right whitespace-nowrap">
                    <button type="button" (click)="iniciarEdicaoOpcao(i)" class="text-sm font-semibold text-blue-600 hover:text-blue-800">Editar</button>
                    <button type="button" (click)="removerOpcao(i)" class="ml-3 text-sm font-semibold text-red-600 hover:text-red-800">Remover</button>
                  </td>
                </tr>
                <tr *ngIf="editandoOpcao() === i" [formGroup]="formOpcaoEdicao" class="bg-blue-50">
                  <td class="px-4 py-3 text-slate-500">{{ i + 1 }}</td>
                  <td class="px-3 py-2">
                    <input type="text" formControlName="valor" placeholder="Valor"
                      class="w-full max-w-md rounded-lg border border-slate-300 bg-white px-2 py-1 text-sm outline-none focus:border-blue-600" />
                  </td>
                  <td class="px-3 py-2 text-right whitespace-nowrap">
                    <button type="button" (click)="salvarEdicaoOpcao()" class="text-sm font-semibold text-emerald-600 hover:text-emerald-800">Salvar</button>
                    <button type="button" (click)="cancelarEdicaoOpcao()" class="ml-3 text-sm font-semibold text-slate-500 hover:text-slate-700">Cancelar</button>
                  </td>
                </tr>
              </ng-container>
              <tr *ngIf="opcoes().length === 0">
                <td [attr.colspan]="modoVisualizacao ? 2 : 3" class="px-4 py-8 text-center text-sm text-slate-500">Nenhuma opção cadastrada ainda.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ================= AÇÕES ================= -->
      <div *ngIf="!modoVisualizacao" class="flex flex-col gap-3 sm:flex-row sm:justify-end">
        <button type="button" (click)="cancelar()"
          class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
          Cancelar
        </button>
        <button type="button" (click)="salvar()"
          class="inline-flex items-center justify-center rounded-2xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700">
          {{ id ? 'Salvar Alterações' : 'Salvar Informação' }}
        </button>
      </div>

    </div>
  </div>
</div>
