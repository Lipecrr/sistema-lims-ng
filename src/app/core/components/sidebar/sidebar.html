<aside
  class="h-screen fixed left-0 top-0 bg-[#1e293b] text-slate-100 shadow-lg flex flex-col transition-[width] duration-200 z-20"
  [class.w-64]="!recolhida()"
  [class.w-20]="recolhida()">
  <div class="flex flex-col h-full">
    <div class="px-4 py-5 flex items-center gap-2 border-b border-slate-800" [class.justify-center]="recolhida()">
      <div class="h-10 w-10 shrink-0 rounded-md bg-blue-700 flex items-center justify-center text-white font-bold">LP</div>
      <div class="overflow-hidden" *ngIf="!recolhida()">
        <div class="text-sm font-bold whitespace-nowrap">LIMS Precision</div>
        <div class="text-xs text-slate-300 whitespace-nowrap">Lab Management</div>
      </div>
      <button *ngIf="!recolhida()" type="button" (click)="alternarSidebar()"
        class="ml-auto shrink-0 h-8 w-8 flex items-center justify-center rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors"
        aria-label="Recolher menu">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
    </div>

    <button *ngIf="recolhida()" type="button" (click)="alternarSidebar()"
      class="mx-auto mt-3 h-8 w-8 flex items-center justify-center rounded-md text-slate-300 hover:bg-slate-800 hover:text-white transition-colors"
      aria-label="Expandir menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    </button>

    <nav class="flex-1 overflow-y-auto overflow-x-hidden px-0 py-4">
      <ul class="space-y-1">
        <li *ngFor="let item of navItems">
          <a [routerLink]="item.route" routerLinkActive="bg-[#1e40af] text-white" [title]="recolhida() ? item.label : null"
            class="flex items-center gap-3 py-3 text-sm font-medium hover:bg-slate-800 hover:text-white transition-colors"
            [class.pl-6]="!recolhida()" [class.justify-center]="recolhida()">
            <span class="w-6 h-6 flex items-center justify-center text-slate-200 shrink-0">
              <ng-container *ngIf="item.icon === 'layout-grid'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="8" height="8" /><rect x="13" y="3" width="8" height="8" /><rect x="3" y="13" width="8" height="8" /><rect x="13" y="13" width="8" height="8" /></svg> </ng-container>
              <ng-container *ngIf="item.icon === 'briefcase'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2" /><path d="M16 7V5a2 2 0 0 0-2-2H10a2 2 0 0 0-2 2v2"/></svg> </ng-container>
              <ng-container *ngIf="item.icon === 'clipboard-list'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 2h6v4H9z"/><rect x="4" y="6" width="16" height="16" rx="2"/><path d="M8 11h8M8 15h8"/></svg> </ng-container>
              <ng-container *ngIf="item.icon === 'beaker'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 2v6.5"/><path d="M4 10h16l-4 8H8z"/></svg> </ng-container>
              <ng-container *ngIf="item.icon === 'package-plus'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73L12 3 4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73L12 21l8-3.27A2 2 0 0 0 21 16z"/><path d="M12 7v6M9 10h6"/></svg> </ng-container>
              <ng-container *ngIf="item.icon === 'microscope'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 21h12"/><path d="M7 7l5 5"/><path d="M17 3l-4 4"/></svg> </ng-container>
              <ng-container *ngIf="item.icon === 'shield-check'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l7 4v5c0 5-3 9-7 11-4-2-7-6-7-11V6l7-4z"/><path d="M9 12l2 2 4-4"/></svg> </ng-container>
              <ng-container *ngIf="item.icon === 'bar-chart-3'"> <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3v18h18"/><path d="M7 12v6"/><path d="M12 8v10"/><path d="M17 4v14"/></svg> </ng-container>
            </span>
            <span class="truncate" *ngIf="!recolhida()">{{ item.label }}</span>
          </a>
        </li>
      </ul>

      <div class="mt-4 pt-4" [class.px-6]="!recolhida()">
        <div class="text-xs uppercase text-slate-400 font-semibold px-6" *ngIf="!recolhida()">Cadastro</div>
        <ul class="mt-2 space-y-1">
          <li *ngFor="let sub of cadastro">
            <a [routerLink]="sub.route" routerLinkActive="bg-[#1e40af] text-white" [title]="recolhida() ? sub.label : null"
              class="flex items-center gap-3 py-2 text-sm hover:bg-slate-800 rounded-md transition-colors"
              [class.pl-8]="!recolhida()" [class.justify-center]="recolhida()">
              <span class="w-5 h-5 text-slate-200 shrink-0 flex items-center justify-center">⚙️</span>
              <span *ngIf="!recolhida()">{{ sub.label }}</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="px-4 py-4 border-t border-slate-800">
      <div class="flex items-center gap-3" [class.justify-center]="recolhida()">
        <div class="h-10 w-10 shrink-0 rounded-full bg-slate-700 flex items-center justify-center text-white">U</div>
        <ng-container *ngIf="!recolhida()">
          <div class="flex-1 overflow-hidden">
            <div class="text-sm font-semibold truncate">{{ user.name }}</div>
            <div class="text-xs text-slate-400 truncate">{{ user.role }}</div>
          </div>
          <button class="text-slate-300 hover:text-white shrink-0">Logout</button>
        </ng-container>
      </div>
    </div>
  </div>
</aside>
